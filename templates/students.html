<!DOCTYPE html>
<html>
<head>
    <title>All Students</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        a{
            text-decoration:none;
            color:white;
            background:#28a745;
            padding:10px 15px;
            border-radius:5px;
        }

        .top{
            margin-bottom:20px;
        }
    </style>

</head>
<body>

<h1>Registered Students</h1>

<div class="top">
    <a href="/student-register">+ Register New Student</a>
</div>

<table>

    <tr>
        <th>Roll Number</th>
        <th>Full Name</th>
        <th>Username</th>
        <th>Class</th>
    </tr>

    {% for student in students %}

    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>
    </tr>

    {% endfor %}

</table>

</body>
</html>
